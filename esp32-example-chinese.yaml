substitutions:
  name: mly-mppt-ch
  device_description: "Monitor and control a MPPT Solar Battery Charger System via RS485"
  external_components_source: github://Depressboy/esphome-mly-mppt-ch@main
  tx_pin: GPIO16
  rx_pin: GPIO17
  rx_timeout: 2000ms

esphome:
  name: ${name}
  comment: ${device_description}
  min_version: 2024.6.0
  project:
    name: "Depressboy.esphome-mly-mppt-ch"
    version: 1.0.1

esp8266:
  board: d1_mini

external_components:
  - source: ${external_components_source}
    refresh: 0s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

ota:
  platform: esphome

logger:
  level: DEBUG

# If you use Home Assistant please remove this `mqtt` section and uncomment the `api` component!
# The native API has many advantages over MQTT: https://esphome.io/components/api.html#advantages-over-mqtt
mqtt:
  broker: !secret mqtt_host
  username: !secret mqtt_username
  password: !secret mqtt_password
  id: mqtt_client

api:

uart:
  - id: uart_bus_0
    baud_rate: 9600
    tx_pin: ${tx_pin}
    rx_pin: ${rx_pin}

modbus:

sensor:
  - platform: mly_mppt_ch
    pv_voltage:
      name: "PVV-光伏电压"
    battery_voltage:
      name: "BAT-电池电压"
    charging_current:
      name: "CCU-充电电流"
    charging_power:
      name: "CCP-充电功率"
    total_energy:
      name: "TOE-总发电量"
    internal_temperature:
      name: "INT-内部温度"
    update_interval: 1s